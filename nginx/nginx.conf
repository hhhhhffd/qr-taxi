worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Gzip configuration
    gzip on;
    gzip_types application/json text/css application/javascript;

    # Use Docker's internal DNS so upstreams are resolved per-request,
    # not at startup. This lets nginx start even if api/frontend aren't ready yet.
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;
        server_name localhost;

        # Variables force runtime DNS resolution via the resolver above.
        set $api_upstream      http://api:8000;
        set $frontend_upstream http://frontend:80;
        set $metabase_upstream http://metabase:3000;

        location /api/ {
            proxy_pass $api_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /ws/ {
            proxy_pass $api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400;
        }

        # Platform router — smart QR landing, no /api/ prefix.
        # MicroMessenger UA → redirects to /we/; others → HTML with TG deeplink.
        location /go/ {
            proxy_pass $api_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Pass the real User-Agent so the backend can detect WeChat
            proxy_set_header User-Agent $http_user_agent;
        }

        # WeChat H5 sub-app — same SPA build, basename=/we handled by React Router.
        # SPA fallback is handled by the frontend container's own nginx.conf.
        location /we/ {
            proxy_pass $frontend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # Metabase is exposed under /metabase/* for signed iframe embeds.
        # Trailing slash form strips the /metabase prefix when proxying.
        location /metabase/ {
            proxy_pass $metabase_upstream/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Prefix /metabase;
        }

        # Vite outputs content-hashed bundles under /assets/ — cache aggressively.
        location /assets/ {
            proxy_pass $frontend_upstream;
            proxy_set_header Host $host;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        location / {
            proxy_pass $frontend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }
}
